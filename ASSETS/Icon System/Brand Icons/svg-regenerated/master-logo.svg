<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">AGU Clean Services Master Logo</title>
  <desc id="desc">Master brand SVG logo for AGU Clean Services using navy, gold and silver brand icon styling.</desc>
  <defs>
    <linearGradient id="masterGold" x1="330" y1="80" x2="1260" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6D879"/>
      <stop offset="0.36" stop-color="#FFF0B2"/>
      <stop offset="0.68" stop-color="#E5B73D"/>
      <stop offset="1" stop-color="#A87512"/>
    </linearGradient>
    <linearGradient id="masterSilver" x1="332" y1="610" x2="1260" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.42" stop-color="#D8DEE8"/>
      <stop offset="0.76" stop-color="#F4F7FB"/>
      <stop offset="1" stop-color="#B9C2CF"/>
    </linearGradient>
    <linearGradient id="masterNavy" x1="278" y1="220" x2="1334" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17366D"/>
      <stop offset="0.44" stop-color="#0C285C"/>
      <stop offset="1" stop-color="#091D47"/>
    </linearGradient>
    <radialGradient id="masterHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 396) rotate(90) scale(315 470)">
      <stop stop-color="#FFF4BE"/>
      <stop offset="0.55" stop-color="#F2D05D"/>
      <stop offset="1" stop-color="#FFF9E1"/>
    </radialGradient>
    <filter id="masterShadow" x="160" y="70" width="1280" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1B2331" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B2331" flood-opacity="0.14"/>
    </filter>
    <filter id="masterGlow" x="230" y="20" width="1140" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>
  <g opacity="0.74" filter="url(#masterGlow)">
    <ellipse cx="800" cy="394" rx="420" ry="270" fill="url(#masterHalo)"/>
  </g>

  <g filter="url(#masterShadow)">
    <path d="M472 266L800 84L1126 265" stroke="url(#masterGold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1034 141H1080V215" stroke="url(#masterGold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="760" y="166" width="56" height="56" fill="url(#masterNavy)"/>
    <path d="M788 166V222M760 194H816" stroke="#D4A93E" stroke-width="4"/>

    <text x="800" y="568" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="420" font-weight="700" letter-spacing="6" fill="url(#masterNavy)">AGU</text>
    <text x="800" y="568" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="420" font-weight="700" letter-spacing="6" fill="url(#masterGold)" opacity="0.2">AGU</text>

    <path d="M318 612C472 565 610 565 752 612C914 667 1089 668 1282 604" stroke="url(#masterGold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M334 632C488 593 636 600 770 644C910 689 1082 688 1266 626" stroke="url(#masterSilver)" stroke-width="13" stroke-linecap="round"/>
    <path d="M336 644C506 620 662 634 806 668C936 699 1088 697 1262 647" stroke="url(#masterNavy)" stroke-width="10" stroke-linecap="round"/>

    <text x="800" y="742" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="132" font-weight="500" letter-spacing="7" fill="url(#masterNavy)">CLEAN SERVICES</text>
    <path d="M322 802H744" stroke="url(#masterGold)" stroke-width="4" stroke-linecap="round"/>
    <path d="M856 802H1278" stroke="url(#masterGold)" stroke-width="4" stroke-linecap="round"/>
    <path d="M800 830C807 851 816 860 837 867C816 874 807 883 800 904C793 883 784 874 763 867C784 860 793 851 800 830Z" fill="url(#masterGold)"/>
    <text x="800" y="874" text-anchor="middle" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="6" fill="url(#masterNavy)">HOME  •  OFFICE  •  COMMERCIAL CLEANING</text>
  </g>

  <path d="M556 406C564 433 575 444 602 452C575 460 564 471 556 498C548 471 537 460 510 452C537 444 548 433 556 406Z" fill="url(#masterGold)"/>
  <path d="M1128 156C1140 195 1156 211 1195 223C1156 235 1140 251 1128 290C1116 251 1100 235 1061 223C1100 211 1116 195 1128 156Z" fill="url(#masterGold)"/>
  <path d="M1238 150C1246 177 1257 188 1284 196C1257 204 1246 215 1238 242C1230 215 1219 204 1192 196C1219 188 1230 177 1238 150Z" fill="url(#masterNavy)"/>
  <path d="M1196 246C1207 282 1221 296 1257 307C1221 318 1207 332 1196 368C1185 332 1171 318 1135 307C1171 296 1185 282 1196 246Z" fill="url(#masterNavy)"/>
</svg>
