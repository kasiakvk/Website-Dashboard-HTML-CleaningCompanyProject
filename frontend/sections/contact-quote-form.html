<section class="section">
  <div class="container contact-grid">
    <div class="contact-stack">
      <article class="contact-card">
        <div class="contact-row">
          <div class="icon-badge"><img src="../frontend/assets/contact/whatsapp.png" alt="Call and WhatsApp icon" /></div>
          <div><div class="contact-label" data-i18n="contact.callLabel">Call / WhatsApp</div><div class="contact-value">07448738971</div></div>
        </div>
      </article>
      <article class="contact-card">
        <div class="contact-row">
          <div class="icon-badge"><img src="../frontend/assets/contact/email.png" alt="Email icon" /></div>
          <div><div class="contact-label" data-i18n="contact.emailLabel">Email</div><div class="contact-value">agucleanservices@gmail.com</div></div>
        </div>
      </article>
      <article class="contact-card">
        <div class="contact-row">
          <div class="icon-badge"><img src="../frontend/assets/contact/mobile.png" alt="Owner contact icon" /></div>
          <div><div class="contact-label">Owner</div><div class="contact-value">Agnieszka Kalina vel Kalinowska</div></div>
        </div>
      </article>
      <article class="contact-card">
        <div class="contact-row">
          <div class="icon-badge"><img src="../frontend/assets/contact/location.png" alt="Service area icon" /></div>
          <div><div class="contact-label" data-i18n="contact.areaLabel">Service Area</div><div class="contact-value">Newcastle • Gateshead • Chester-le-Street • Durham</div></div>
        </div>
      </article>
    </div>

    <article class="contact-card">
      <h3 data-i18n="contact.formH">Get a free quote</h3>
      <p style="margin:0 0 20px;color:var(--text-700);" data-i18n="contact.formP">Share the property type, location and service needed. This layout is ready for future backend integration.</p>
      <form class="form-grid" id="quote-form">
        <div class="form-row">
          <div>
            <label for="name" data-i18n="contact.name">Full name</label>
            <input id="name" name="name" type="text" placeholder="Your name" data-i18n-placeholder="contact.namePh" />
          </div>
          <div>
            <label for="phone" data-i18n="contact.phone">Phone</label>
            <input id="phone" name="phone" type="tel" placeholder="07448738971" />
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="email" data-i18n="contact.email">Email</label>
            <input id="email" name="email" type="email" placeholder="agucleanservices@gmail.com" />
          </div>
          <div>
            <label for="service" data-i18n="nav.services">Service</label>
            <select id="service" name="service" aria-label="Service required">
              <option value="" data-i18n="contact.select">Select service</option>
              <option data-i18n="price.regular.h">Regular cleaning</option>
              <option data-i18n="price.deep.h">Deep cleaning</option>
              <option data-i18n="price.tenancy.h">End of tenancy</option>
              <option data-i18n="price.commercial.h">Commercial cleaning</option>
              <option data-i18n="prices.airbnbH">Airbnb cleaning</option>
            </select>
          </div>
        </div>
        <div>
          <label for="message" data-i18n="contact.message">Property details</label>
          <textarea id="message" name="message" placeholder="Property size, location and any details that help with the quote" data-i18n-placeholder="contact.messagePh"></textarea>
        </div>
        <div>
          <button class="button" type="submit" data-i18n="contact.send">Send enquiry</button>
        </div>
      </form>
    </article>
  </div>
</section>
